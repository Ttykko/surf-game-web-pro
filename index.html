<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surf Resources Adventure | Pro Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- OVERLAY DE AUTENTICACIÓN -->
    <section id="auth-overlay" class="overlay">
        <div class="auth-card">
            <header>
                <h1 class="neon-text">🏄‍♂️ SURF CHECK-IN</h1>
                <p id="player-turn-label" class="status-label">Esperando surfistas en el lobby...</p>
            </header>

            <!-- CONTENEDOR DE FORMULARIO PARA OCULTAR TRAS LOGIN -->
            <div id="auth-form" class="form-group">
                <div class="input-container">
                    <input type="text" id="username" placeholder="Nombre de usuario" autocomplete="off">
                    <span class="help-icon" title="Cualquier apodo único para la competencia">?</span>
                </div>
                <div class="input-container">
                    <input type="email" id="email" placeholder="Correo (ejemplo@dominio.com)">
                    <span class="help-icon" title="Obligatorio: debe incluir @ y dominio válido">?</span>
                </div>
                <div class="input-container">
                    <input type="password" id="password" placeholder="Contraseña">
                    <span class="help-icon" title="Mínimo 4 caracteres de seguridad">?</span>
                </div>
                <button id="loginBtn" class="btn-primary">INGRESAR AL AGUA 🌊</button>
            </div>

            <!-- LINKS Y RECUPERACIÓN -->
            <div id="recovery-links" style="margin-top: 15px;">
                <a href="#" id="forgotPasswordBtn" class="link-secundario">¿Olvidaste tu acceso? Recuperar</a>
            </div>

            <div id="reset-password-section" style="display:none; margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                <div class="form-group">
                    <input type="text" id="recoveryCodeInp" placeholder="Código de 8 dígitos">
                    <input type="password" id="newPasswordInp" placeholder="Nueva contraseña">
                    <button id="resetPasswordBtn" class="btn-primary" style="background: #ffd700; color: #000;">ACTUALIZAR LLAVE 🔑</button>
                </div>
            </div>

            <footer class="auth-footer">
                <p id="auth-msg" class="error-msg"></p>
            </footer>
        </div>
    </section>

    <!-- TABLERO DE JUEGO PRINCIPAL -->
    <main id="gameBoard" class="grid-container">
        <!-- PANELES DE JUGADORES (1-4) -->
        <article id="player1" class="player-panel">
            <header class="panel-header"><h2><span class="player-name">Esperando...</span></h2></header>
            <div class="items-container"><ul class="items-grid items"></ul></div>
        </article>

        <article id="player2" class="player-panel">
            <header class="panel-header"><h2><span class="player-name">Esperando...</span></h2></header>
            <div class="items-container"><ul class="items-grid items"></ul></div>
        </article>

        <article id="player3" class="player-panel">
            <header class="panel-header"><h2><span class="player-name">Esperando...</span></h2></header>
            <div class="items-container"><ul class="items-grid items"></ul></div>
        </article>

        <article id="player4" class="player-panel">
            <header class="panel-header"><h2><span class="player-name">Esperando...</span></h2></header>
            <div class="items-container"><ul class="items-grid items"></ul></div>
        </article>

        <!-- PANEL DE ACCIÓN Y CONTROL (EL RECUADRO RESPONSIVO) -->
        <section id="centerPanel" class="action-center">
            <div class="game-info">
                <h2 class="game-title">SURF RESOURCES ADVENTURE</h2>
                <p id="status" class="game-status">Estado: Conectando con servidor...</p>
                <button id="rollBtn" class="btn-roll" hidden>🎲 TIRAR DADO</button>
            </div>

            <aside id="leaderboard" class="accordion">
                <button id="toggleHistoryBtn" class="accordion-header">
                    🏆 ÚLTIMOS GANADORES <span class="arrow">▼</span>
                </button>
                <div id="historyContent" class="accordion-content">
                    <ul id="winnersList" class="history-list">
                        <li style="opacity: 0.5; padding: 10px;">Cargando historial...</li>
                    </ul>
                </div>
            </aside>
        </section>
    </main>

    <!-- SCRIPTS CORE -->
    <script src="https://jsdelivr.net"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>

</body>
</html>
